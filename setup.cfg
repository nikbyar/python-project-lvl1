[coverage:run]
branch = True

[flake8]
accept-encodings = utf-8
max-complexity = 6
statistics = False
max-line-length = 90
doctests = True
enable-extensions = G
isort-show-traceback = True
max-module-score = 19

# clean default ignore list
ignore = S311,
      # S311 Standard pseudo-random generators are not suitable for security/cryptographic purposes.
        D100, D103, D104,
      # Missing docstring in public module, function, package
        WPS421,
      # WPS421 Found wrong function call: print - не используется в реальных проектах
        WPS305,
      # WPS305 Found `f` string
        WPS503,
      # WPS503 line break before binary operator
        WPS326,
      # WPS326 Found implicit string concatenation
exclude = test.py, even_backup.py, cli_backup.py

per-file-ignores =
  # it is possibble to have prints in scripts
  hexlet_python_package/scripts/*.py: WPS421

[tool:pytest]
norecursedirs = __pycache__
addopts = --strict-markers

[isort]
# See https://github.com/timothycrosley/isort#multi-line-output-modes
multi_line_output = 3
include_trailing_comma = true
default_section = FIRSTPARTY
# Should be: 80 - 1
line_length = 79
